{% extends 'base.html' %}

{% block title %}Upload Resume{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <h3 class="mb-4 text-center">Upload Your Resume</h3>
                    <p class="text-muted text-center mb-4">
                        Upload your resume to generate personalized interview questions based on your skills and experience.
                    </p>
                    
                    <form method="POST" enctype="multipart/form-data" class="text-center">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="resume" class="upload-area d-block p-5 border rounded">
                                <i class="fas fa-cloud-upload-alt fa-3x text-primary mb-3"></i>
                                <p class="mb-0">Drop your resume here or click to browse</p>
                                <small class="text-muted">PDF or DOCX (max 5MB)</small>
                            </label>
                            <input type="file" name="resume" id="resume" accept=".pdf,.docx" class="d-none" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-arrow-right me-2"></i> Continue
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.querySelector('label[for="resume"]').addEventListener('click', function() {
    document.getElementById('resume').click();
});

document.getElementById('resume').addEventListener('change', function(e) {
    if (e.target.files.length > 0) {
        this.nextElementSibling.querySelector('p').textContent = e.target.files[0].name;
    }
});
</script>
{% endblock %}
