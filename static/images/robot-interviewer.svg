<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad2)"/>
  <!-- Robot head -->
  <rect x="150" y="100" width="100" height="80" rx="10" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="175" cy="130" r="8" fill="#00ff00"/>
  <circle cx="225" cy="130" r="8" fill="#00ff00"/>
  <!-- Mouth -->
  <rect x="190" y="150" width="20" height="10" fill="#333"/>
  <!-- Antennas -->
  <line x1="200" y1="100" x2="190" y2="80" stroke="#333" stroke-width="3"/>
  <line x1="200" y1="100" x2="210" y2="80" stroke="#333" stroke-width="3"/>
  <circle cx="190" cy="78" r="3" fill="#ff0000"/>
  <circle cx="210" cy="78" r="3" fill="#ff0000"/>
  <text x="200" y="250" text-anchor="middle" fill="#ffffff" font-size="18" font-family="Arial">Robot Interviewer</text>
  <text x="200" y="275" text-anchor="middle" fill="#ffffff" font-size="14" font-family="Arial">AI-Powered Assessment</text>
</svg>