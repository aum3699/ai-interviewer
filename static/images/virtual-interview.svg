<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad4)"/>
  <!-- Laptop -->
  <rect x="120" y="120" width="160" height="100" rx="8" fill="#ffffff" stroke="#333" stroke-width="2"/>
  <rect x="140" y="140" width="120" height="60" fill="#000033"/>
  <!-- Webcam dot -->
  <circle cx="200" cy="135" r="3" fill="#ff0000"/>
  <!-- Person silhouette -->
  <circle cx="200" cy="80" r="25" fill="#333"/>
  <rect x="185" y="105" width="30" height="40" rx="15" fill="#333"/>
  <!-- Screen content -->
  <text x="200" y="165" text-anchor="middle" fill="#00ff00" font-size="14" font-family="Arial">Virtual Interview</text>
  <text x="200" y="185" text-anchor="middle" fill="#00ff00" font-size="12" font-family="Arial">Online Assessment</text>
  <!-- Connection lines -->
  <line x1="150" y1="200" x2="250" y2="200" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="200" y="270" text-anchor="middle" fill="#ffffff" font-size="18" font-family="Arial">Remote Interview</text>
</svg>